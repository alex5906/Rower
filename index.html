<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rowing Machine Coach</title>
    <style>
        body {
            font-family: sans-serif;
            background: #ffffff;
            color: #000000;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .section {
            border: 2px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        .preset-btn {
            padding: 10px;
            margin-right: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            background: #f0f0f0;
            border: 1px solid #aaa;
        }
        .active-preset {
            background: #3182ce;
            color: white;
        }
        table {
            width: 100%;
            margin-bottom: 15px;
        }
        th, td {
            padding: 5px;
            text-align: left;
        }
        input {
            width: 80px;
            padding: 4px;
        }
        .hud-box {
            font-size: 24px;
            font-weight: bold;
            margin: 15px 0;
            padding: 10px;
            background: #f7fafc;
            border-left: 5px solid #3182ce;
        }
        .big-timer {
            font-size: 48px;
            font-family: monospace;
            color: #e53e3e;
        }
        .action-btn {
            font-size: 18px;
            padding: 10px 20px;
            background: #2b6cb0;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        .danger-btn {
            background: #c53030;
        }
    </style>
</head>
<body>

    <h1>🚣‍♂️ Simple Row Coach</h1>

    <div class="section" id="setup-section">
        <h3>1. Select a Routine</h3>
        <button class="preset-btn active-preset" onclick="loadRoutine('pyramid')">Pace Pyramid</button>
        <button class="preset-btn" onclick="loadRoutine('hiit')">HIIT Sprints</button>
        <button class="preset-btn" onclick="loadRoutine('steady')">Steady State</button>

        <h3>2. Edit Intervals</h3>
        <table>
            <thead>
                <tr>
                    <th>Label</th>
                    <th>Minutes</th>
                    <th>Pace (SPM)</th>
                    <th>Damper</th>
                </tr>
            </thead>
            <tbody id="interval-rows">
                </tbody>
        </table>
        
        <button class="action-btn" onclick="startWorkout()">▶ Start Workout</button>
    </div>

    <div class="section" id="hud-section" style="display:none;">
        <h2 id="current-type">Warm Up</h2>
        
        <div class="hud-box">
            Time Remaining:<br>
            <span class="big-timer" id="display-time">00:00</span>
        </div>

        <div class="hud-box">
            Target Pace: <span id="display-pace" style="color:#2b6cb0;">20</span> SPM
        </div>

        <div class="hud-box">
            Machine Resistance: Damper <span id="display-damper" style="color:#dd6b20;">4</span>
        </div>

        <p id="display-next" style="color:#718096; font-style:italic;"></p>

        <button class="action-btn danger-btn" onclick="stopWorkout()">🛑 Stop & Reset</button>
    </div>

<script>
    // Pure, raw JavaScript data arrays
    var currentIntervals = [];
    var currentIndex = 0;
    var secondsLeft = 0;
    var timerId = null;

    // Hardcoded simple preset generator
    function loadRoutine(name) {
        // Highlight active button
        var buttons = document.getElementsByClassName('preset-btn');
        for(var i=0; i<buttons.length; i++) {
            buttons[i].className = "preset-btn";
        }
        if(name === 'pyramid') {
            event.target.className = "preset-btn active-preset";
            currentIntervals = [
                {name: "Warm Up", min: 3, spm: 20, damper: 4},
                {name: "Work Block", min: 2, spm: 24, damper: 5},
                {name: "Peak Interval", min: 1, spm: 28, damper: 5},
                {name: "Cool Down", min: 2, spm: 18, damper: 3}
            ];
        } else if(name === 'hiit') {
            event.target.className = "preset-btn active-preset";
            currentIntervals = [
                {name: "Warm Up", min: 2, spm: 20, damper: 4},
                {name: "Sprint!", min: 1, spm: 30, damper: 6},
                {name: "Rest Row", min: 1, spm: 18, damper: 4},
                {name: "Sprint!", min: 1, spm: 32, damper: 6},
                {name: "Cool Down", min: 2, spm: 18, damper: 3}
            ];
        } else {
            event.target.className = "preset-btn active-preset";
            currentIntervals = [
                {name: "Warm Up", min: 2, spm: 20, damper: 4},
                {name: "Steady State", min: 10, spm: 22, damper: 5},
                {name: "Cool Down", min: 2, spm: 18, damper: 4}
            ];
        }
        renderTable();
    }

    function renderTable() {
        var tbody = document.getElementById('interval-rows');
        tbody.innerHTML = "";
        for(var i = 0; i < currentIntervals.length; i++) {
            tbody.innerHTML += "<tr>" +
                "<td><input type='text' value='" + currentIntervals[i].name + "' onchange='updateVal(" + i + ", \"name\", this.value)'></td>" +
                "<td><input type='number' value='" + currentIntervals[i].min + "' onchange='updateVal(" + i + ", \"min\", this.value)'></td>" +
                "<td><input type='number' value='" + currentIntervals[i].spm + "' onchange='updateVal(" + i + ", \"spm\", this.value)'></td>" +
                "<td><input type='number' value='" + currentIntervals[i].damper + "' onchange='updateVal(" + i + ", \"damper\", this.value)'></td>" +
            "</tr>";
        }
    }

    function updateVal(index, key, val) {
        if(key === 'name') {
            currentIntervals[index][key] = val;
        } else {
            currentIntervals[index][key] = parseFloat(val) || 0;
        }
    }

    // Engine Controls
    function startWorkout() {
        if(currentIntervals.length === 0) return;
        
        document.getElementById('setup-section').style.display = 'none';
        document.getElementById('hud-section').style.display = 'block';
        
        currentIndex = 0;
        setupSegment(currentIndex);

        clearInterval(timerId);
        timerId = setInterval(tick, 1000);
    }

    function setupSegment(index) {
        if(index >= currentIntervals.length) {
            clearInterval(timerId);
            alert("Workout finished! Great row.");
            stopWorkout();
            return;
        }

        var segment = currentIntervals[index];
        secondsLeft = Math.round(segment.min * 60);

        document.getElementById('current-type').innerText = "🔥 Current: " + segment.name;
        document.getElementById('display-pace').innerText = segment.spm;
        document.getElementById('display-damper').innerText = segment.damper;

        // Next preview lookahead
        if(index + 1 < currentIntervals.length) {
            var next = currentIntervals[index + 1];
            document.getElementById('display-next').innerText = "Up Next: " + next.name + " (" + next.min + " min at " + next.spm + " SPM)";
        } else {
            document.getElementById('display-next').innerText = "Up Next: Finished!";
        }

        updateTimeText();
    }

    function tick() {
        secondsLeft--;
        if(secondsLeft < 0) {
            currentIndex++;
            setupSegment(currentIndex);
        } else {
            updateTimeText();
        }
    }

    function updateTimeText() {
        var m = Math.floor(secondsLeft / 60);
        var s = secondsLeft % 60;
        if (m < 10) m = "0" + m;
        if (s < 10) s = "0" + s;
        document.getElementById('display-time').innerText = m + ":" + s;
    }

    function stopWorkout() {
        clearInterval(timerId);
        document.getElementById('setup-section').style.display = 'block';
        document.getElementById('hud-section').style.display = 'none';
    }

    // Default load
    loadRoutine('pyramid');
</script>
</body>
</html>
