<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rowing Machine Coach</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/umd/lucide.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --accent: #f59e0b;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
        }

        .card {
            background-color: var(--card-dark);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .routine-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 600px) {
            .routine-grid { grid-template-columns: 1fr; }
        }

        .btn-routine {
            background: #334155;
            border: 2px solid transparent;
            color: var(--text-light);
            padding: 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }

        .btn-routine:hover {
            background: #475569;
        }

        .btn-routine.active {
            border-color: var(--primary);
            background: #0c4a6e;
        }

        .routine-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .routine-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #334155;
        }

        th { color: var(--text-muted); font-size: 0.9rem; }

        input {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 0.4rem;
            border-radius: 0.25rem;
            width: 100%;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: background 0.2s;
        }

        .btn:hover { background-color: var(--primary-hover); }
        .btn-danger { background-color: #ef4444; }
        .btn-danger:hover { background-color: #dc2626; }
        .btn-secondary { background-color: #475569; }
        .btn-secondary:hover { background-color: #334155; }

        .hud-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            text-align: center;
            margin-top: 1.5rem;
        }

        .hud-block {
            background: #0f172a;
            padding: 1rem;
            border-radius: 0.5rem;
        }

        .hud-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .hud-value {
            font-size: 2.5rem;
            font-weight: bold;
            font-family: monospace;
            color: var(--text-light);
            margin-top: 0.25rem;
        }

        .hud-value.highlight { color: var(--accent); }
        .hud-value.pace { color: #38bdf8; }

        .progress-bar-container {
            background: #334155;
            height: 12px;
            border-radius: 6px;
            margin-top: 1.5rem;
            overflow: hidden;
        }

            background: var(--success);
            height: 100%;
            width: 0
